let heroAnim;
function initHeroCanvas(){const canvas=document.getElementById('hero-canvas');if(!canvas)return;const ctx=canvas.getContext('2d');let w,h,particles=[],gears=[];function resize(){w=canvas.width=canvas.parentElement.offsetWidth;h=canvas.height=canvas.parentElement.offsetHeight;}resize();window.addEventListener('resize',resize);class Particle{constructor(){this.reset();}reset(){this.x=Math.random()*w;this.y=Math.random()*h;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.r=Math.random()*2+0.5;this.o=Math.random()*0.5+0.1;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>w||this.y<0||this.y>h)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,107,53,${this.o})`;ctx.fill();}}class Gear{constructor(x,y,r,teeth,speed,color){this.x=x;this.y=y;this.r=r;this.teeth=teeth;this.speed=speed;this.angle=0;this.color=color;}update(){this.angle+=this.speed;}draw(){ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.angle);ctx.beginPath();ctx.arc(0,0,this.r*0.7,0,Math.PI*2);ctx.strokeStyle=this.color;ctx.lineWidth=1.5;ctx.stroke();for(let i=0;i<this.teeth;i++){const a=(Math.PI*2/this.teeth)*i;ctx.beginPath();ctx.moveTo(Math.cos(a)*this.r*0.7,Math.sin(a)*this.r*0.7);ctx.lineTo(Math.cos(a)*this.r,Math.sin(a)*this.r);ctx.stroke();}ctx.beginPath();ctx.arc(0,0,this.r*0.15,0,Math.PI*2);ctx.stroke();ctx.restore();}}for(let i=0;i<60;i++)particles.push(new Particle());gears.push(new Gear(w*0.75,h*0.25,80,12,0.003,'rgba(255,107,53,0.12)'));gears.push(new Gear(w*0.85,h*0.45,50,8,-0.005,'rgba(255,107,53,0.08)'));gears.push(new Gear(w*0.65,h*0.6,65,10,0.004,'rgba(255,107,53,0.1)'));gears.push(new Gear(w*0.9,h*0.15,35,6,-0.007,'rgba(255,107,53,0.06)'));function animate(){ctx.clearRect(0,0,w,h);ctx.strokeStyle='rgba(255,107,53,0.03)';ctx.lineWidth=0.5;for(let x=0;x<w;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}for(let y=0;y<h;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}particles.forEach(p=>{p.update();p.draw();});gears.forEach(g=>{g.update();g.draw();});heroAnim=requestAnimationFrame(animate);}animate();}
function stopHeroCanvas(){if(heroAnim)cancelAnimationFrame(heroAnim);}
function initScrollAnim(){const obs=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});},{threshold:0.1});document.querySelectorAll('.anim-fade').forEach(el=>obs.observe(el));}

ction class="py-20 px-4" style="background:var(--primary2);"><div class="max-w-4xl mx-auto text-center anim-fade" style="background:linear-gradient(135deg,rgba(255,107,53,0.1),rgba(255,107,53,0.02));border:1px solid rgba(255,107,53,0.2);border-radius:16px;padding:3rem 2rem;"><h2 class="section-title">Comienza tu <span>Futuro</span> Hoy</h2><p class="mt-3 mb-6" style="color:var(--text-muted);max-width:500px;margin-left:auto;margin-right:auto;">Preinscríbete ahora y asegura tu lugar.</p><button class="btn-primary" onclick="navigate('preinscripcion')"><i class="fas fa-pen-to-square"></i> Preinscribirme Ahora</button></div></section>${renderFooter()}`;}

function renderCarreras(){return `${renderHeader()}<section class="py-20 px-4"><div class="max-w-7xl mx-auto"><div class="text-center anim-fade"><h2 class="section-title">Nuestras <span>Carreras</span></h2><div class="section-line mx-auto"></div></div><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">${CAREERS.map((c,i)=>`<div class="career-card anim-fade" style="transition-delay:${i*0.1}s" onclick="navigate('career-detail',{careerId:'${c.id}'})"><div class="relative overflow-hidden"><img src="${c.img}" alt="${c.short}" loading="lazy"><div class="card-icon"><i class="fas ${c.icon}"></i></div></div><div class="card-body"><h3 class="text-xl font-bold mb-2" style="font-family:Oswald;">${c.short}</h3><p class="text-sm mb-4" style="color:var(--text-muted);line-height:1.6;">${c.desc}</p><div class="flex gap-2 flex-wrap">${Object.keys(c.years).map(y=>`<span class="text-xs px-2 py-1 rounded" style="background:var(--glass);border:1px solid var(--border);color:var(--text-muted);">${y}</span>`).join('')}</div></div></div>`).join('')}</div></div></section>${renderFooter()}`;}

function renderCareerDetail(){const career=CAREERS.find(c=>c.id===state.careerId);if(!career)return renderCarreras();const yearKeys=Object.keys(career.years);const activeYear=state.yearKey||yearKeys[0];const yearData=career.years[activeYear];return `${renderHeader()}<section class="py-8 px-4" style="background:var(--primary2);"><div class="max-w-7xl mx-auto"><div class="flex items-center gap-2 text-sm mb-4" style="color:var(--text-muted);"><a style="cursor:pointer;color:var(--accent);" onclick="navigate('home')">Inicio</a><i class="fas fa-chevron-right text-xs"></i><a style="cursor:pointer;color:var(--accent);" onclick="navigate('carreras')">Carreras</a><i class="fas fa-chevron-right text-xs"></i><span>${career.short}</span></div><div class="flex flex-col md:flex-row gap-8 items-start"><div class="md:w-1/3"><img src="${career.img}" alt="${career.short}" class="rounded-xl w-full" style="height:220px;object-fit:cover;"></div><div class="md:w-2/3"><div class="flex items-center gap-3 mb-3"><div class="w-14 h-14 rounded-xl flex items-center justify-center" style="background:var(--accent);"><i class="fas ${career.icon} text-xl text-white"></i></div><h1 class="text-3xl font-bold" style="font-family:Oswald;">${career.name}</h1></div><p style="color:var(--text-muted);line-height:1.7;">${career.desc}</p><button class="btn-primary mt-4" onclick="navigate('preinscripcion',{selectedCareer:'${career.id}'})"><i class="fas fa-pen-to-square"></i> Preinscribirse</button></div></div></div></section><section class="py-10 px-4"><div class="max-w-7xl mx-auto"><div class="flex flex-wrap gap-3 mb-8">${yearKeys.map(y=>`<button class="tab-btn ${y===activeYear?'active':''}" onclick="state.yearKey='${y}';render();">${y}</button>`).join('')}</div><div class="anim-fade"><h3 class="text-xl font-bold mb-4" style="font-family:Oswald;"><i class="fas fa-book mr-2" style="color:var(--accent);"></i>Cursos - ${activeYear}</h3><div class="overflow-x-auto rounded-xl" style="border:1px solid var(--border);"><table class="data-table"><thead><tr><th>No.</th><th>Curso</th><th>Docente</th></tr></thead><tbody>${yearData.courses.map((c,i)=>`<tr><td>${i+1}</td><td style="font-weight:600;">${c.name}</td><td style="color:var(--text-muted);">${c.teacher}</td></tr>`).join('')}</tbody></table></div></div><div class="mt-10 anim-fade" style="transition-delay:0.1s;"><h3 class="text-xl font-bold mb-4" style="font-family:Oswald;"><i class="fas fa-clock mr-2" style="color:var(--accent);"></i>Horario - ${activeYear}</h3><div class="overflow-x-auto rounded-xl" style="border:1px solid var(--border);"><table class="data-table"><thead><tr><th>Hora</th><th>Lunes</th><th>Martes</th><th>Miércoles</th><th>Jueves</th><th>Viernes</th></tr></thead><tbody>${yearData.schedule.map(s=>`<tr><td style="font-weight:600;white-space:nowrap;">${s.time}</td>${s.days.map(d=>`<td style="font-size:0.85rem;">${d}</td>`).join('')}</tr>`).join('')}</tbody></table></div></div><div class="mt-10 anim-fade" style="transition-delay:0.2s;"><h3 class="text-xl font-bold mb-4" style="font-family:Oswald;"><i class="fas fa-chalkboard-teacher mr-2" style="color:var(--accent);"></i>Docentes - ${activeYear}</h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">${[...new Map(yearData.courses.map(c=>[c.teacher,c])).values()].map(c=>`<div class="p-4 rounded-lg" style="background:var(--card);border:1px solid var(--border);"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-full flex items-center justify-center text-sm font-bold" style="background:var(--accent);color:#fff;">${c.teacher.split(' ').map(w=>w[0]).slice(0,2).join('')}</div><div><div class="font-semibold text-sm">${c.teacher}</div><div class="text-xs" style="color:var(--text-muted);">${c.name}</div></div></div></div>`).join('')}</div></div></div></section>${renderFooter()}`;}

function renderPublicaciones(){return `${renderHeader()}<section class="py-20 px-4"><div class="max-w-7xl mx-auto"><div class="text-center anim-fade"><h2 class="section-title">Noticias y <span>Publicaciones</span></h2><div class="section-line mx-auto"></div></div><div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mt-12">${posts.map((p,i)=>`<div class="post-card anim-fade" style="transition-delay:${i*0.1}s"><img src="${p.img}" alt="${p.title}" style="width:100%;height:200px;object-fit:cover;" loading="lazy"><div class="p-5"><span class="text-xs font-semibold" style="color:var(--accent);"><i class="far fa-calendar"></i> ${formatDate(p.date)}</span><h4 class="font-bold mt-2 mb-3" style="font-family:Oswald;font-size:1.2rem;">${p.title}</h4><p class="text-sm" style="color:var(--text-muted);line-height:1.6;">${p.content}</p></div></div>`).join('')}</div></div></section>${renderFooter()}`;}

function renderPreinscripcion(){const selCareer=state.selectedCareer||'';return `${renderHeader()}<section class="py-20 px-4" style="min-height:70vh;"><div class="max-w-2xl mx-auto"><div class="text-center anim-fade"><h2 class="section-title">Pre<span>inscripción</span></h2><div class="section-line mx-auto"></div></div><form class="mt-10 p-8 rounded-2xl anim-fade" style="background:var(--card);border:1px solid var(--border);" onsubmit="submitPreinscripcion(event)"><div class="grid grid-cols-1 md:grid-cols-2 gap-5"><div class="md:col-span-2"><label class="form-label">Nombre Completo *</label><input type="text" class="form-input" id="pi-name" required placeholder="Nombre completo"></div><div><label class="form-label">DPI *</label><input type="text" class="form-input" id="pi-dpi" required></div><div><label class="form-label">Teléfono *</label><input type="tel" class="form-input" id="pi-phone" required></div><div><label class="form-label">Correo</label><input type="email" class="form-input" id="pi-email"></div><div><label class="form-label">Fecha de Nacimiento *</label><input type="date" class="form-input" id="pi-birth" required></div><div><label class="form-label">Carrera *</label><select class="form-input" id="pi-career" required><option value="">-- Seleccionar --</option>${CAREERS.map(c=>`<option value="${c.id}" ${c.id===selCareer?'selected':''}>${c.name}</option>`).join('')}</select></div><div><label class="form-label">Año *</label><select class="form-input" id="pi-year" required><option value="">-- Seleccionar --</option><option>4to</option><option>5to</option><option>6to</option></select></div><div class="md:col-span-2"><label class="form-label">Dirección</label><input type="text" class="form-input" id="pi-address"></div><div class="md:col-span-2"><label class="form-label">Encargado *</label><input type="text" class="form-input" id="pi-guardian" required></div><div class="md:col-span-2"><label class="form-label">Tel. Encargado *</label><input type="tel" class="form-input" id="pi-guardian-phone" required></div></div><div class="mt-6 flex items-start gap-3"><input type="checkbox" id="pi-terms" required class="mt-1" style="accent-color:var(--accent);"><label for="pi-terms" class="text-sm" style="color:var(--text-muted);">Acepto el uso de mis datos para el proceso de inscripción.</label></div><button type="submit" class="btn-primary w-full mt-6 justify-center"><i class="fas fa-paper-plane"></i> Enviar Preinscripción</button></form></div></section>${renderFooter()}`;}

function submitPreinscripcion(e){e.preventDefault();const user={id:Date.now(),name:document.getElementById('pi-name').value.trim(),dpi:document.getElementById('pi-dpi').value.trim(),phone:document.getElementById('pi-phone').value.trim(),email:document.getElementById('pi-email').value.trim(),birth:document.getElementById('pi-birth').value,career:document.getElementById('pi-career').value,year:document.getElementById('pi-year').value,address:document.getElementById('pi-address').value.trim(),guardian:document.getElementById('pi-guardian').value.trim(),guardianPhone:document.getElementById('pi-guardian-phone').value.trim(),date:new Date().toISOString(),status:'Pendiente'};users.push(user);saveUsers();toast('Preinscripción enviada exitosamente.','success');openModal(`<div class="p-8 text-center"><div class="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4" style="background:rgba(34,197,94,0.15);"><i class="fas fa-check-circle text-4xl" style="color:var(--success);"></i></div><h3 class="text-2xl font-bold mb-2" style="font-family:Oswald;">Registrada</h3><p style="color:var(--text-muted);">Nombre: <strong>${user.name}</strong></p><p style="color:var(--text-muted);">Carrera: <strong>${CAREERS.find(c=>c.id===user.career)?.name||user.career}</strong></p><p style="color:var(--text-muted);">Año: <strong>${user.year}</strong></p><p style="color:var(--text-muted);margin-bottom:20px;">Estado: <span style="color:var(--warning);font-weight:600;">Pendiente</span></p><p class="text-sm mb-6" style="color:var(--text-muted);">Referencia: <strong style="color:var(--accent);">#${user.id}</strong></p><button class="btn-primary" onclick="closeModal();navigate('home')">Entendido</button></div>`);}

function renderAdminLogin(){return `${renderHeader()}<section class="py-20 px-4" style="min-height:70vh;display:flex;align-items:center;"><div class="max-w-md mx-auto w-full"><div class="p-8 rounded-2xl anim-fade" style="background:var(--card);border:1px solid var(--border);"><div class="text-center mb-8"><div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background:rgba(255,107,53,0.15);"><i class="fas fa-shield-halved text-2xl" style="color:var(--accent);"></i></div><h2 class="text-2xl font-bold" style="font-family:Oswald;">Acceso Administrador</h2></div><form onsubmit="adminLogin(event)"><label class="form-label">Contraseña</label><div class="relative"><input type="password" class="form-input" id="admin-pass" required placeholder="Contraseña" style="padding-right:45px;"><button type="button" class="absolute right-3 top-1/2 -translate-y-1/2" style="background:none;border:none;color:var(--text-muted);cursor:pointer;" onclick="togglePassVis('admin-pass',this)"><i class="fas fa-eye"></i></button></div><button type="submit" class="btn-primary w-full mt-5 justify-center"><i class="fas fa-sign-in-alt"></i> Ingresar</button></form><p class="text-center mt-4"><a style="cursor:pointer;color:var(--accent);font-size:0.9rem;" onclick="navigate('home')"><i class="fas fa-arrow-left"></i> Volver</a></p></div></div></section>${renderFooter()}`;}

function adminLogin(e){e.preventDefault();const entered=String(document.getElementById('admin-pass').value||'').trim().toLowerCase();const allowedPasswords=[String(settings.adminPass||'admin1').trim().toLowerCase(),'admin1','admin2024','admin','adm1'];if(allowedPasswords.includes(entered)){state.adminLogged=true;toast('Bienvenido','success');navigate('admin-panel',{adminTab:'dashboard'});}else{toast('Contraseña incorrecta','error');}}

function renderAdminPanel(){if(!state.adminLogged)return renderAdminLogin();const tab=state.adminTab||'dashboard';return `<div class="admin-sidebar"><div class="px-6 py-4 mb-4" style="border-bottom:1px solid var(--border);"><div class="flex items-center gap-2 cursor-pointer" onclick="navigate('home')"><i class="fas fa-industry" style="color:var(--accent);"></i><span class="font-bold text-sm" style="font-family:Oswald;">ITI Admin</span></div></div><a class="${tab==='dashboard'?'active':''}" onclick="state.adminTab='dashboard';state.adminCareerId=null;render();"><i class="fas fa-chart-pie w-5"></i> Dashboard</a><a class="${tab==='carreras'?'active':''}" onclick="state.adminTab='carreras';state.adminCareerId=null;render();"><i class="fas fa-graduation-cap w-5"></i> Carreras</a><a class="${tab==='usuarios'?'active':''}" onclick="state.adminTab='usuarios';render();"><i class="fas fa-users w-5"></i> Usuarios</a><a class="${tab==='publicaciones'?'active':''}" onclick="state.adminTab='publicaciones';render();"><i class="fas fa-newspaper w-5"></i> Publicaciones</a><a class="${tab==='apariencia'?'active':''}" onclick="state.adminTab='apariencia';render();"><i class="fas fa-palette w-5"></i> Apariencia</a><a class="${tab==='mision-vision'?'active':''}" onclick="state.adminTab='mision-vision';render();"><i class="fas fa-bullseye w-5"></i> Misión y Visión</a><a class="${tab==='config'?'active':''}" onclick="state.adminTab='config';render();"><i class="fas fa-cog w-5"></i> Configuración</a><div style="position:absolute;bottom:20px;width:100%;"><a onclick="state.adminLogged=false;navigate('home');"><i class="fas fa-sign-out-alt w-5"></i> Cerrar Sesión</a></div></div><div class="admin-main"><div class="flex items-center justify-between mb-6 flex-wrap gap-4"><h1 class="text-2xl font-bold" style="font-family:Oswald;text-transform:uppercase;">${tab==='dashboard'?'Dashboard':tab==='carreras'?(state.adminCareerId?'Editar Carrera':'Gestión de Carreras'):tab==='usuarios'?'Usuarios Registrados':tab==='publicaciones'?'Publicaciones':tab==='apariencia'?'Apariencia':tab==='mision-vision'?'Misión y Visión':'Configuración'}</h1></div>${tab==='dashboard'?renderAdminDashboard():tab==='carreras'?renderAdminCarreras():tab==='usuarios'?renderAdminUsers():tab==='publicaciones'?renderAdminPosts():tab==='apariencia'?renderAdminApariencia():tab==='mision-vision'?renderAdminMV():renderAdminConfig()}</div>`;}

function renderAdminDashboard(){const cc={};CAREERS.forEach(c=>{cc[c.id]=users.filter(u=>u.career===c.id).length;});return `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5 mb-8"><div class="stat-card"><div class="stat-num">${users.length}</div><div class="text-sm mt-1" style="color:var(--text-muted);">Preinscritos</div></div><div class="stat-card"><div class="stat-num" style="color:var(--warning);">${users.filter(u=>u.status==='Pendiente').length}</div><div class="text-sm mt-1" style="color:var(--text-muted);">Pendientes</div></div><div class="stat-card"><div class="stat-num">${posts.length}</div><div class="text-sm mt-1" style="color:var(--text-muted);">Publicaciones</div></div><div class="stat-card"><div class="stat-num">${CAREERS.length}</div><div class="text-sm mt-1" style="color:var(--text-muted);">Carreras</div></div></div><h3 class="text-lg font-bold mb-4" style="font-family:Oswald;">Preinscritos por Carrera</h3><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 mb-8">${CAREERS.map(c=>`<div class="p-4 rounded-lg" style="background:var(--card);border:1px solid var(--border);"><div class="flex items-center gap-3 mb-2"><i class="fas ${c.icon}" style="color:var(--accent);"></i><span class="font-semibold text-sm">${c.short}</span></div><div class="flex items-end gap-2"><span class="text-2xl font-bold" style="font-family:Oswald;color:var(--accent);">${cc[c.id]}</span><span class="text-xs mb-1" style="color:var(--text-muted);">estudiantes</span></div><div class="mt-2 h-2 rounded-full overflow-hidden" style="background:var(--glass);"><div class="h-full rounded-full" style="background:var(--accent);width:${users.length?Math.max(5,(cc[c.id]/users.length)*100):0}%;"></div></div></div>`).join('')}</div><h3 class="text-lg font-bold mb-4" style="font-family:Oswald;">Últimos Registros</h3><div class="overflow-x-auto rounded-xl" style="border:1px solid var(--border);"><table class="data-table"><thead><tr><th>Nombre</th><th>Carrera</th><th>Año</th><th>Estado</th></tr></thead><tbody>${users.slice(-5).reverse().map(u=>{const c=CAREERS.find(cr=>cr.id===u.career);return `<tr><td>${u.name}</td><td>${c?c.short:u.career}</td><td>${u.year}</td><td><span class="px-2 py-1 rounded text-xs font-semibold" style="background:${u.status==='Pendiente'?'rgba(245,158,11,0.15);color:var(--warning)':'rgba(34,197,94,0.15);color:var(--success)'}">${u.status}</span></td></tr>`;}).join('')}${users.length===0?'<tr><td colspan="4" class="text-center" style="color:var(--text-muted);">Sin registros.</td></tr>':''}</tbody></table></div>`;}

/* ============================================
   ADMIN - CARRERAS (NUEVO EDITOR COMPLETO)
   ============================================ */
function renderAdminCarreras(){
  if(!state.adminCareerId){
    /* Lista de carreras */
    return `
    <button class="btn-primary mb-6" onclick="addNewCareer()"><i class="fas fa-plus"></i> Agregar Nueva Carrera</button>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
      ${CAREERS.map(c=>`
      <div class="p-5 rounded-xl" style="background:var(--card);border:1px solid var(--border);transition:all .3s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
        <div class="flex items-start gap-4">
          <img src="${c.img}" alt="" style="width:80px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0;">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1"><i class="fas ${c.icon}" style="color:var(--accent);"></i><span class="font-bold text-sm" style="font-family:Oswald;">${c.short}</span></div>
            <p class="text-xs mb-1" style="color:var(--text-muted);">${c.name}</p>
            <p class="text-xs" style="color:var(--text-muted);">${Object.keys(c.years).length} años | ${Object.values(c.years).reduce((a,y)=>a+y.courses.length,0)} cursos</p>
          </div>
        </div>
        <div class="flex gap-2 mt-4">
          <button class="btn-primary btn-sm flex-1 justify-center" onclick="state.adminCareerId='${c.id}';state.adminCareerYear=Object.keys(CAREERS.find(x=>x.id==='${c.id}').years)[0];render();"><i class="fas fa-edit"></i> Editar</button>
          <button class="btn-danger" onclick="deleteCareer('${c.id}')"><i class="fas fa-trash"></i></button>
        </div>
      </div>`).join('')}
    </div>`;
  }

  /* Editor de carrera específica */
  const career=CAREERS.find(c=>c.id===state.adminCareerId);
  if(!career){state.adminCareerId=null;return renderAdminCarreras();}
  const yearKeys=Object.keys(career.years);
  const activeYear=state.adminCareerYear||yearKeys[0];
  const yd=career.years[activeYear];

  return `
  <button class="btn-outline btn-sm mb-6" onclick="state.adminCareerId=null;render();"><i class="fas fa-arrow-left"></i> Volver a lista</button>

  <!-- Datos generales -->
  <div class="p-6 rounded-2xl mb-6" style="background:var(--card);border:1px solid var(--border);">
    <h3 class="text-lg font-bold mb-4" style="font-family:Oswald;"><i class="fas fa-info-circle mr-2" style="color:var(--accent);"></i>Datos Generales</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div><label class="form-label">Nombre Completo</label><input type="text" class="form-input" id="ed-cname" value="${career.name}"></div>
      <div><label class="form-label">Nombre Corto</label><input type="text" class="form-input" id="ed-cshort" value="${career.short}"></div>
      <div class="md:col-span-2"><label class="form-label">Descripción</label><textarea class="form-input" id="ed-cdesc" rows="2">${career.desc}</textarea></div>
    </div>
    <div class="mt-5">
      <label class="form-label">Icono</label>
      <div class="flex flex-wrap gap-2">
        ${AVAILABLE_ICONS.map(ic=>`<div class="icon-pick ${career.icon===ic?'active':''}" onclick="document.querySelectorAll('.icon-pick').forEach(e=>e.classList.remove('active'));this.classList.add('active');this.dataset.icon='${ic}';"><i class="fas ${ic}"></i></div>`).join('')}
      </div>
    </div>
    <div class="mt-5 flex items-center gap-4 flex-wrap">
      <div><label class="form-label">Foto de Portada</label><label class="btn-primary btn-sm cursor-pointer"><i class="fas fa-upload"></i> Subir Foto<input type="file" accept="image/*" style="display:none;" onchange="uploadCareerImg(event)"></label></div>
      <img src="${career.img}" alt="" style="height:60px;border-radius:8px;object-fit:cover;border:1px solid var(--border);">
      <div><label class="form-label">O URL de imagen</label><input type="text" class="form-input" id="ed-cimgurl" value="${career.img.startsWith('data:')?'':career.img}" style="width:250px;" placeholder="https://..."></div>
    </div>
    <button class="btn-primary mt-5" onclick="saveCareerGeneral()"><i class="fas fa-save"></i> Guardar Datos Generales</button>
  </div>

  <!-- Años -->
  <div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-3">
      <h3 class="text-lg font-bold" style="font-family:Oswald;"><i class="fas fa-calendar-alt mr-2" style="color:var(--accent);"></i>Contenido por Año</h3>
      <button class="btn-success btn-sm" onclick="addYearToCareer()"><i class="fas fa-plus"></i> Agregar Año</button>
    </div>
    <div class="flex flex-wrap gap-3 mb-6">
      ${yearKeys.map(y=>`<button class="tab-btn ${y===activeYear?'active':''}" onclick="state.adminCareerYear='${y}';render();">${y}</button>`).join('')}
    </div>

    ${yd?`
    <!-- CURSOS -->
    <h4 class="font-bold mb-3" style="font-family:Oswald;color:var(--accent);"><i class="fas fa-book mr-2"></i>Cursos de ${activeYear}</h4>
    <div class="overflow-x-auto rounded-xl mb-2" style="border:1px solid var(--border);">
      <table class="data-table">
        <thead><tr><th style="width:40px;">#</th><th>Nombre del Curso</th><th>Docente</th><th style="width:50px;"></th></tr></thead>
        <tbody id="courses-tbody">
          ${yd.courses.map((c,i)=>`<tr><td>${i+1}</td><td><input type="text" class="sched-input" style="width:100%;min-width:180px;" value="${c.name}" data-ci="${i}" data-field="name"></td><td><input type="text" class="sched-input" style="width:100%;min-width:200px;" value="${c.teacher}" data-ci="${i}" data-field="teacher"></td><td><button class="btn-danger" style="padding:4px 8px;" onclick="removeCourseRow(${i})"><i class="fas fa-times"></i></button></td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <button class="btn-outline btn-sm mb-8" onclick="addCourseRow()"><i class="fas fa-plus"></i> Agregar Curso</button>

    <!-- HORARIO -->
    <h4 class="font-bold mb-3" style="font-family:Oswald;color:var(--accent);"><i class="fas fa-clock mr-2"></i>Horario de ${activeYear}</h4>
    <div class="overflow-x-auto rounded-xl mb-2" style="border:1px solid var(--border);">
      <table class="data-table">
        <thead><tr><th style="width:110px;">Hora</th><th>Lunes</th><th>Martes</th><th>Miércoles</th><th>Jueves</th><th>Viernes</th><th style="width:40px;"></th></tr></thead>
        <tbody id="sched-tbody">
          ${yd.schedule.map((s,i)=>`<tr><td><input type="text" class="sched-input" value="${s.time}" data-si="${i}" data-field="time"></td>${s.days.map((d,di)=>`<td><input type="text" class="sched-input" value="${d}" data-si="${i}" data-day="${di}"></td>`).join('')}<td><button class="btn-danger" style="padding:4px 8px;" onclick="removeSchedRow(${i})"><i class="fas fa-times"></i></button></td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <button class="btn-outline btn-sm mb-6" onclick="addSchedRow()"><i class="fas fa-plus"></i> Agregar Fila de Horario</button>
    <br>
    <button class="btn-primary" onclick="saveYearData()"><i class="fas fa-save"></i> Guardar Cursos y Horario de ${activeYear}</button>
    `:'<p style="color:var(--text-muted);">Selecciona o agrega un año.</p>'}
  </div>`;
}

function saveCareerGeneral(){
  const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
  c.name=document.getElementById('ed-cname').value.trim()||c.name;
  c.short=document.getElementById('ed-cshort').value.trim()||c.short;
  c.desc=document.getElementById('ed-cdesc').value.trim()||c.desc;
  const activeIcon=document.querySelector('.icon-pick.active');
  if(activeIcon)c.icon=activeIcon.dataset.icon;
  const imgUrl=document.getElementById('ed-cimgurl').value.trim();
  if(imgUrl)c.img=imgUrl;
  saveCareers();toast('Datos generales guardados','success');render();
}

function uploadCareerImg(e){
  const file=e.target.files[0];if(!file)return;
  if(file.size>2*1024*1024){toast('Máximo 2MB','error');return;}
  const reader=new FileReader();
  reader.onload=function(ev){
    const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
    c.img=ev.target.result;saveCareers();render();toast('Foto de carrera actualizada','success');
  };reader.readAsDataURL(file);
}

function addNewCareer(){
  const id='career_'+Date.now();
  CAREERS.push({id,name:'Nueva Carrera',short:'Nueva Carrera',icon:'fa-graduation-cap',img:'https://picsum.photos/seed/new-career-'+Date.now()+'/600/400',desc:'Describe la nueva carrera aquí.',years:{"4to":{courses:[{name:"Curso 1",teacher:"Docente 1"}],schedule:[{time:"7:00 - 8:00",days:["","","","",""]}]}}});
  saveCareers();state.adminCareerId=id;state.adminCareerYear='4to';toast('Carrera creada','success');render();
}

function deleteCareer(id){
  openModal(`<div class="p-6 text-center"><div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4" style="background:rgba(239,68,68,0.15);"><i class="fas fa-exclamation-triangle text-2xl" style="color:var(--danger);"></i></div><h3 class="text-xl font-bold mb-2" style="font-family:Oswald;">Eliminar Carrera</h3><p class="mb-6" style="color:var(--text-muted);">Se eliminará toda la información de esta carrera.</p><div class="flex gap-3 justify-center"><button class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-danger" onclick="CAREERS=CAREERS.filter(c=>c.id!=='${id}');saveCareers();state.adminCareerId=null;closeModal();toast('Carrera eliminada','info');render();">Eliminar</button></div></div>`);
}

function addYearToCareer(){
  const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
  const num=Object.keys(c.years).length+4;
  const labels=['4to','5to','6to'];
  const label=labels[num-4]||num+'to';
  c.years[label]={courses:[{name:"Curso 1",teacher:"Docente 1"}],schedule:[{time:"7:00 - 8:00",days:["","","","",""]}]};
  saveCareers();state.adminCareerYear=label;toast('Año agregado','success');render();
}

function addCourseRow(){
  const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
  const yd=c.years[state.adminCareerYear];if(!yd)return;
  yd.courses.push({name:"",teacher:""});render();
}

function removeCourseRow(i){
  const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
  c.years[state.adminCareerYear].courses.splice(i,1);render();
}

function addSchedRow(){
  const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
  c.years[state.adminCareerYear].schedule.push({time:"",days:["","","","",""]});render();
}

function removeSchedRow(i){
  const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
  c.years[state.adminCareerYear].schedule.splice(i,1);render();
}

function saveYearData(){
  const c=CAREERS.find(x=>x.id===state.adminCareerId);if(!c)return;
  const yd=c.years[state.adminCareerYear];if(!yd)return;
  /* Leer cursos de los inputs */
  document.querySelectorAll('#courses-tbody input[data-ci]').forEach(inp=>{
    const idx=parseInt(inp.dataset.ci);
    const field=inp.dataset.field;
    if(yd.courses[idx])yd.courses[idx][field]=inp.value.trim();
  });
  /* Leer horarios de los inputs */
  document.querySelectorAll('#sched-tbody input[data-si]').forEach(inp=>{
    const idx=parseInt(inp.dataset.si);
    if(inp.dataset.field==='time'){if(yd.schedule[idx])yd.schedule[idx].time=inp.value.trim();}
    else if(inp.dataset.day!==undefined){const di=parseInt(inp.dataset.day);if(yd.schedule[idx]&&yd.schedule[idx].days[di]!==undefined)yd.schedule[idx].days[di]=inp.value.trim();}
  });
  saveCareers();toast('Cursos y horario guardados','success');
}

/* ============================================
   ADMIN - USUARIOS
   ============================================ */
function renderAdminUsers(){return `<div class="flex flex-wrap gap-3 mb-6"><select class="form-input" style="width:auto;min-width:200px;" id="filter-career" onchange="filterUsers()"><option value="">Todas las carreras</option>${CAREERS.map(c=>`<option value="${c.id}">${c.short}</option>`).join('')}</select><input type="text" class="form-input" style="width:auto;min-width:250px;" id="filter-search" placeholder="Buscar..." oninput="filterUsers()"></div><div id="users-list">${renderUserList(users)}</div>`;}

function renderUserList(list){if(list.length===0)return '<p style="color:var(--text-muted);text-align:center;padding:40px;">Sin resultados.</p>';return list.map(u=>{const c=CAREERS.find(cr=>cr.id===u.career);return `<div class="user-row"><div class="flex flex-wrap items-start justify-between gap-4"><div class="flex-1 min-w-0"><div class="flex items-center gap-3 flex-wrap"><span class="font-bold">${u.name}</span><span class="px-2 py-0.5 rounded text-xs font-semibold" style="background:${u.status==='Pendiente'?'rgba(245,158,11,0.15);color:var(--warning)':'rgba(34,197,94,0.15);color:var(--success)'}">${u.status}</span></div><div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-1 mt-2 text-sm" style="color:var(--text-muted);"><span><i class="fas fa-id-card w-4" style="color:var(--accent);"></i> ${u.dpi}</span><span><i class="fas fa-phone w-4" style="color:var(--accent);"></i> ${u.phone}</span><span><i class="fas fa-envelope w-4" style="color:var(--accent);"></i> ${u.email||'-'}</span><span><i class="fas fa-graduation-cap w-4" style="color:var(--accent);"></i> ${c?c.short:u.career} - ${u.year}</span><span><i class="fas fa-user-tie w-4" style="color:var(--accent);"></i> ${u.guardian}</span><span><i class="fas fa-phone w-4" style="color:var(--accent);"></i> ${u.guardianPhone}</span></div><div class="text-xs mt-2" style="color:var(--text-muted);">Ref: #${u.id}</div></div><div class="flex gap-2 flex-shrink-0">${u.status==='Pendiente'?`<button class="btn-success btn-sm" onclick="changeUserStatus(${u.id},'Aprobado')"><i class="fas fa-check"></i></button>`:`<button class="btn-sm" style="background:var(--warning);color:#000;border:none;border-radius:4px;cursor:pointer;" onclick="changeUserStatus(${u.id},'Pendiente')"><i class="fas fa-undo"></i></button>`}<button class="btn-danger" onclick="deleteUser(${u.id})"><i class="fas fa-trash"></i></button></div></div></div>`;}).join('');}

function filterUsers(){const career=document.getElementById('filter-career').value;const search=document.getElementById('filter-search').value.toLowerCase();let f=users;if(career)f=f.filter(u=>u.career===career);if(search)f=f.filter(u=>u.name.toLowerCase().includes(search));document.getElementById('users-list').innerHTML=renderUserList(f);}
function changeUserStatus(id,s){const u=users.find(u=>u.id===id);if(u){u.status=s;saveUsers();toast('Estado actualizado','success');render();}}
function deleteUser(id){openModal(`<div class="p-6 text-center"><h3 class="text-xl font-bold mb-2" style="font-family:Oswald;">Eliminar Registro</h3><p class="mb-6" style="color:var(--text-muted);">Esta acción no se puede deshacer.</p><div class="flex gap-3 justify-center"><button class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-danger" onclick="users=users.filter(u=>u.id!==${id});saveUsers();closeModal();toast('Eliminado','info');render();">Eliminar</button></div></div>`);}

/* ============================================
   ADMIN - PUBLICACIONES
   ============================================ */
function renderAdminPosts(){return `<button class="btn-primary mb-6" onclick="openPostForm()"><i class="fas fa-plus"></i> Nueva Publicación</button><div class="space-y-4">${posts.map(p=>`<div class="post-card p-4 flex flex-col sm:flex-row gap-4"><img src="${p.img}" alt="" style="width:140px;height:90px;object-fit:cover;border-radius:8px;flex-shrink:0;"><div class="flex-1 min-w-0"><span class="text-xs" style="color:var(--accent);">${formatDate(p.date)}</span><h4 class="font-bold mt-1" style="font-family:Oswald;">${p.title}</h4><p class="text-sm mt-1" style="color:var(--text-muted);">${p.content.substring(0,100)}...</p></div><div class="flex gap-2 flex-shrink-0 self-start"><button class="btn-primary btn-sm" onclick="openPostForm(${p.id})"><i class="fas fa-edit"></i></button><button class="btn-danger" onclick="deletePost(${p.id})"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div>`;}

function openPostForm(editId=null){const post=editId?posts.find(p=>p.id===editId):null;openModal(`<div class="p-6"><h3 class="text-xl font-bold mb-4" style="font-family:Oswald;">${post?'Editar':'Nueva'} Publicación</h3><form onsubmit="savePostForm(event,${editId||'null'})"><label class="form-label">Título *</label><input type="text" class="form-input mb-4" id="post-title" required value="${post?post.title:''}"><label class="form-label">Contenido *</label><textarea class="form-input mb-4" id="post-content" required rows="4">${post?post.content:''}</textarea><label class="form-label">Fecha *</label><input type="date" class="form-input mb-4" id="post-date" required value="${post?post.date:new Date().toISOString().split('T')[0]}"><label class="form-label">URL de Imagen</label><input type="text" class="form-input mb-4" id="post-img" value="${post?post.img:''}" placeholder="https://..."><div class="flex gap-3 justify-end"><button type="button" class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button><button type="submit" class="btn-primary btn-sm"><i class="fas fa-save"></i> Guardar</button></div></form></div>`);}

function savePostForm(e,editId){e.preventDefault();const data={title:document.getElementById('post-title').value.trim(),content:document.getElementById('post-content').value.trim(),date:document.getElementById('post-date').value,img:document.getElementById('post-img').value.trim()||'https://picsum.photos/seed/p'+Date.now()+'/800/400'};if(editId){const p=posts.find(p=>p.id===editId);if(p)Object.assign(p,data);}else{data.id=Date.now();posts.unshift(data);}savePosts();closeModal();toast('Publicación guardada','success');render();}

function deletePost(id){openModal(`<div class="p-6 text-center"><h3 class="text-xl font-bold mb-2" style="font-family:Oswald;">Eliminar Publicación</h3><p class="mb-6" style="color:var(--text-muted);">Deseas eliminarla?</p><div class="flex gap-3 justify-center"><button class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-danger" onclick="posts=posts.filter(p=>p.id!==${id});savePosts();closeModal();toast('Eliminada','info');render();">Eliminar</button></div></div>`);}

/* ============================================
   ADMIN - APARIENCIA
   ============================================ */
function renderAdminApariencia(){return `<div class="grid grid-cols-1 lg:grid-cols-2 gap-8"><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="text-lg font-bold mb-4" style="font-family:Oswald;"><i class="fas fa-palette mr-2" style="color:var(--accent);"></i>Colores</h3><div class="space-y-4"><div><label class="form-label">Primario</label><div class="flex items-center gap-3"><input type="color" value="${settings.primary}" id="color-primary" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px;"><input type="text" class="form-input" style="width:120px;" id="color-primary-text" value="${settings.primary}" oninput="document.getElementById('color-primary').value=this.value"></div></div><div><label class="form-label">Secundario</label><div class="flex items-center gap-3"><input type="color" value="${settings.primary2}" id="color-primary2" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px;"><input type="text" class="form-input" style="width:120px;" id="color-primary2-text" value="${settings.primary2}" oninput="document.getElementById('color-primary2').value=this.value"></div></div><div><label class="form-label">Acento</label><div class="flex items-center gap-3"><input type="color" value="${settings.accent}" id="color-accent" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px;"><input type="text" class="form-input" style="width:120px;" id="color-accent-text" value="${settings.accent}" oninput="document.getElementById('color-accent').value=this.value"></div></div><div><label class="form-label">Acento Oscuro</label><div class="flex items-center gap-3"><input type="color" value="${settings.accent2}" id="color-accent2" style="width:50px;height:40px;border:none;cursor:pointer;border-radius:6px;"><input type="text" class="form-input" style="width:120px;" id="color-accent2-text" value="${settings.accent2}" oninput="document.getElementById('color-accent2').value=this.value"></div></div><div><label class="form-label">Presets</label><div class="flex flex-wrap gap-2">${[{n:'Naranja',p:'#0a1628',p2:'#132743',a:'#ff6b35',a2:'#e85d26'},{n:'Azul',p:'#0a0f1a',p2:'#111d35',a:'#00b4d8',a2:'#0096c7'},{n:'Verde',p:'#0a1a0a',p2:'#132e13',a:'#22c55e',a2:'#16a34a'},{n:'Dorado',p:'#1a1410',p2:'#2a2018',a:'#d4a017',a2:'#b8860b'},{n:'Rosa',p:'#1a0a14',p2:'#2a1320',a:'#e91e8c',a2:'#c2185b'},{n:'Rojo',p:'#1a0a0a',p2:'#2a1313',a:'#dc2626',a2:'#b91c1c'}].map(pr=>`<button class="flex items-center gap-1 px-2 py-1 rounded text-xs font-semibold" style="background:var(--glass);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;" onclick="applyPreset('${pr.p}','${pr.p2}','${pr.a}','${pr.a2}')"><span class="w-3 h-3 rounded-full inline-block" style="background:${pr.a};"></span>${pr.n}</button>`).join('')}</div></div><button class="btn-primary w-full justify-center mt-4" onclick="saveColors()"><i class="fas fa-save"></i> Aplicar Colores</button></div></div><div class="space-y-6"><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="text-lg font-bold mb-4" style="font-family:Oswald;">Logo</h3><div class="flex items-center gap-4 mb-4"><div class="w-20 h-20 rounded-xl flex items-center justify-center" style="background:var(--glass);border:1px dashed var(--border);overflow:hidden;">${settings.logo?`<img src="${settings.logo}" style="width:100%;height:100%;object-fit:contain;">`:'<i class="fas fa-image text-2xl" style="color:var(--text-muted);"></i>'}</div><div><label class="btn-primary btn-sm cursor-pointer"><i class="fas fa-upload"></i> Subir<input type="file" accept="image/*" style="display:none;" onchange="uploadImage(event,'logo')"></label></div></div>${settings.logo?`<button class="btn-danger btn-sm" onclick="settings.logo=null;saveSettings();applySettings();render();toast('Logo eliminado','info');">Eliminar</button>`:''}</div><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="text-lg font-bold mb-4" style="font-family:Oswald;">Portada</h3><div class="cover-img-container mb-4">${settings.cover?`<img src="${settings.cover}" alt="Portada">`:`<div class="w-full h-full flex items-center justify-center" style="background:var(--glass);"><i class="fas fa-panorama text-4xl" style="color:var(--text-muted);"></i></div>`}</div><label class="btn-primary btn-sm cursor-pointer"><i class="fas fa-upload"></i> Subir<input type="file" accept="image/*" style="display:none;" onchange="uploadImage(event,'cover')"></label>${settings.cover?`<button class="btn-danger btn-sm ml-3" onclick="settings.cover=null;saveSettings();render();">Eliminar</button>`:''}</div></div></div>`;}

function applyPreset(p,p2,a,a2){document.getElementById('color-primary').value=p;document.getElementById('color-primary-text').value=p;document.getElementById('color-primary2').value=p2;document.getElementById('color-primary2-text').value=p2;document.getElementById('color-accent').value=a;document.getElementById('color-accent-text').value=a;document.getElementById('color-accent2').value=a2;document.getElementById('color-accent2-text').value=a2;settings.primary=p;settings.primary2=p2;settings.accent=a;settings.accent2=a2;applySettings();saveSettings();toast('Preset aplicado','success');}
function saveColors(){settings.primary=document.getElementById('color-primary').value;settings.primary2=document.getElementById('color-primary2').value;settings.accent=document.getElementById('color-accent').value;settings.accent2=document.getElementById('color-accent2').value;applySettings();saveSettings();toast('Colores actualizados','success');render();}
function uploadImage(e,type){const file=e.target.files[0];if(!file)return;if(file.size>2*1024*1024){toast('Máximo 2MB','error');return;}const reader=new FileReader();reader.onload=function(ev){settings[type]=ev.target.result;saveSettings();applySettings();render();toast('Imagen actualizada','success');};reader.readAsDataURL(file);}

/* ============================================
   ADMIN - MISIÓN Y VISIÓN
   ============================================ */
function renderAdminMV(){return `<div class="grid grid-cols-1 gap-6"><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="text-lg font-bold mb-2" style="font-family:Oswald;"><i class="fas fa-bullseye mr-2" style="color:var(--accent);"></i>Misión</h3><textarea class="form-input" id="edit-mission" rows="5">${settings.mission}</textarea></div><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="text-lg font-bold mb-2" style="font-family:Oswald;"><i class="fas fa-eye mr-2" style="color:var(--accent);"></i>Visión</h3><textarea class="form-input" id="edit-vision" rows="5">${settings.vision}</textarea></div><button class="btn-primary" onclick="settings.mission=document.getElementById('edit-mission').value;settings.vision=document.getElementById('edit-vision').value;saveSettings();toast('Misión y Visión actualizadas','success');render();"><i class="fas fa-save"></i> Guardar</button></div>`;}

/* ============================================
   ADMIN - CONFIGURACIÓN
   ============================================ */
function renderAdminConfig(){return `<div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="text-lg font-bold mb-4" style="font-family:Oswald;"><i class="fas fa-building mr-2" style="color:var(--accent);"></i>Datos</h3><div class="space-y-4"><div><label class="form-label">Nombre</label><input type="text" class="form-input" id="cfg-name" value="${settings.institutionName}"></div><div><label class="form-label">Teléfono</label><input type="text" class="form-input" id="cfg-phone" value="${settings.phone}"></div><div><label class="form-label">Email</label><input type="email" class="form-input" id="cfg-email" value="${settings.email}"></div><div><label class="form-label">Dirección</label><input type="text" class="form-input" id="cfg-address" value="${settings.address}"></div><div><label class="form-label">WhatsApp</label><input type="text" class="form-input" id="cfg-whatsapp" value="${settings.whatsapp}"></div></div></div><div class="p-6 rounded-2xl" style="background:var(--card);border:1px solid var(--border);"><h3 class="text-lg font-bold mb-4" style="font-family:Oswald;"><i class="fas fa-lock mr-2" style="color:var(--accent);"></i>Seguridad</h3><div class="space-y-4"><div><label class="form-label">Nueva Contraseña</label><input type="password" class="form-input" id="cfg-newpass" placeholder="Dejar vacío para no cambiar"></div><div><label class="form-label">Confirmar</label><input type="password" class="form-input" id="cfg-confirmpass" placeholder="Repetir"></div></div><div class="mt-6 p-4 rounded-lg" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);"><h4 class="font-bold text-sm mb-2" style="color:var(--danger);"><i class="fas fa-exclamation-triangle mr-1"></i> Zona de Peligro</h4><p class="text-sm mb-3" style="color:var(--text-muted);">Eliminar todos los datos.</p><button class="btn-danger" onclick="resetAllData()"><i class="fas fa-trash-alt"></i> Reiniciar Todo</button></div></div></div><button class="btn-primary mt-6" onclick="saveConfig()"><i class="fas fa-save"></i> Guardar</button>`;}

function saveConfig(){settings.institutionName=document.getElementById('cfg-name').value.trim();settings.phone=document.getElementById('cfg-phone').value.trim();settings.email=document.getElementById('cfg-email').value.trim();settings.address=document.getElementById('cfg-address').value.trim();settings.whatsapp=document.getElementById('cfg-whatsapp').value.trim();const np=document.getElementById('cfg-newpass').value;const cp=document.getElementById('cfg-confirmpass').value;if(np){if(np!==cp){toast('Contraseñas no coinciden','error');return;}if(np.length<4){toast('Mínimo 4 caracteres','error');return;}settings.adminPass=np;toast('Contraseña actualizada','success');}saveSettings();applySettings();toast('Configuración guardada','success');render();}

function resetAllData(){openModal(`<div class="p-6 text-center"><h3 class="text-xl font-bold mb-2" style="font-family:Oswald;">Reiniciar Todo</h3><p class="mb-6" style="color:var(--text-muted);">Acción irreversible.</p><div class="flex gap-3 justify-center"><button class="btn-outline btn-sm" onclick="closeModal()">Cancelar</button><button class="btn-danger" onclick="users=[];posts=[];CAREERS=JSON.parse(JSON.stringify(DEFAULT_CAREERS));saveUsers();savePosts();saveCareers();closeModal();toast('Datos reiniciados','info');render();">Reiniciar</button></div></div>`);}

/* ============================================
   RENDER PRINCIPAL
   ============================================ */
function render(){stopHeroCanvas();const app=document.getElementById('app');switch(state.page){case 'home':app.innerHTML=renderHome();break;case 'nosotros':app.innerHTML=renderNosotros();break;case 'carreras':app.innerHTML=renderCarreras();break;case 'career-detail':app.innerHTML=renderCareerDetail();break;case 'publicaciones':app.innerHTML=renderPublicaciones();break;case 'preinscripcion':app.innerHTML=renderPreinscripcion();break;case 'admin-login':app.innerHTML=renderAdminLogin();break;case 'admin-panel':app.innerHTML=renderAdminPanel();break;default:app.innerHTML=renderHome();}if(state.page==='home')requestAnimationFrame(()=>initHeroCanvas());initScrollAnim();const nav=document.getElementById('main-nav');if(nav)window.onscroll=()=>{nav.classList.toggle('scrolled',window.scrollY>50);};}

document.addEventListener('input',e=>{if(e.target.type==='color'){const t=document.getElementById(e.target.id+'-text');if(t)t.value=e.target.value;}});

render();
</script>
</body>
</html>
